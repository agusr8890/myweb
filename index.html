
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Keren Pertamaku</title>
    <style>
        body {
            background-color: #222831; 
            color: #ececec;           
            font-family: sans-serif;  
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;            
            margin: 0;
            text-align: center;
        }
        h1 {
            color: #00adb5;           
        }
        /* --- AREA TOMBOL SOSMED --- */
        .container-tombol {
            display: flex;
            gap: 15px; /* Jarak antar tombol */
            margin-top: 25px;
        }
        .tombol {
            display: inline-block;
            padding: 12px 24px;
            color: #ffffff;            
            text-decoration: none;     
            font-weight: bold;
            border-radius: 8px;        
            transition: 0.3s;
        }
        /* Warna Tombol WA (Hijau) */
        .tombol-wa {
            background-color: #25D366;
        }
        .tombol-wa:hover {
            background-color: #1ebd54;
        }
        /* Warna Tombol FB (Biru) */
        .tombol-fb {
            background-color: #1877F2;
        }
        .tombol-fb:hover {
            background-color: #145dbf;
        }
    </style>
</head>
<body>

    <h1>Halo Dunia!</h1>
    <p>Selamat datang di website pertama saya yang sudah dimodifikasi!</p>
    
    <!-- Wadah Tombol Sosial Media -->
    <div class="container-tombol">
        <!-- Tombol WhatsApp -->
        <a href="https://wa.me/6285267816442" class="tombol tombol-wa" target="_blank">Hubungi via WA</a>
        
        <!-- Tombol Facebook -->
        <a href="https://www.facebook.com/agusttpsetia" class="tombol tombol-fb" target="_blank">Facebook Saya</a>
    </div>

</body>
</html>
