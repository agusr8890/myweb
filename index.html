<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Resmi Agus Riyanto</title>
    <style>
        body {
            background-color: #1a1e24; /* Warna latar sedikit lebih gelap dan premium */
            color: #ececec;           
            font-family: sans-serif;  
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;            
            margin: 0;
            text-align: center;
            padding: 0 20px;
        }
        h1 {
            color: #00adb5;           
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #b2bec3;

        }
        .container-tombol {
            display: flex;
            gap: 15px; 
            margin-top: 30px;
        }
        .tombol {
            display: inline-block;
            padding: 14px 28px;
            color: #ffffff;            
            text-decoration: none;     
            font-weight: bold;
            border-radius: 50px; /* Membuat tombol lonjong melengkung sempurna (gaya modern) */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* Efek bayangan biar tombol terlihat timbul */
        }
        /* Efek interaktif saat tombol ditekan */
        .tombol:active, .tombol:hover {
            transform: translateY(-3px); /* Tombol sedikit mengangkat ke atas */
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        .tombol-wa { background-color: #25D366; }
        .tombol-fb { background-color: #1877F2; }
    </style>
</head>
